version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: magicvics_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: magicvics
      POSTGRES_USER: magicvics
      POSTGRES_PASSWORD: magicvics
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
